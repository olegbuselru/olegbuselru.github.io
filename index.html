<!doctype html>
<html lang="ru" x-data="hubApp()" :class="theme" xmlns="http://www.w3.org/1999/xhtml">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ви.Тех — Артефакты технобренда</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3/dist/cdn.min.js"></script>
  <script defer src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <style>
    :root {
      --bg: #121110;
      --surface: #1a1917;
      --text: #cdccca;
      --primary: #4f98a3;
      --muted: #9a978f;
      --border: rgba(205, 204, 202, 0.14);
      --radius: 14px;
      --shadow: 0 8px 20px rgba(0,0,0,0.25);
      --space-1: 0.5rem;
      --space-2: 0.75rem;
      --space-3: 1rem;
      --space-4: 1.5rem;
      --space-5: 2rem;
      --space-6: 3rem;
      --display: "Instrument Serif", serif;
      --body: "Inter", sans-serif;
    }

    .light {
      --bg: #f7f6f2;
      --surface: #f9f8f5;
      --text: #28251d;
      --primary: #01696f;
      --muted: #70695c;
      --border: rgba(40, 37, 29, 0.12);
      --shadow: 0 8px 20px rgba(0,0,0,0.08);
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      font-family: var(--body);
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
      transition: background .25s, color .25s;
    }

    .container { width: min(1180px, 100% - 2rem); margin-inline: auto; }
    .surface {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
    }

    header {
      position: sticky;
      top: 0;
      z-index: 30;
      backdrop-filter: blur(8px);
      background: color-mix(in srgb, var(--bg) 84%, transparent);
      border-bottom: 1px solid var(--border);
    }

    .nav-wrap { display: flex; align-items: center; justify-content: space-between; padding: 0.9rem 0; gap: 1rem; }
    .brand { display: flex; align-items: center; gap: 0.7rem; text-decoration: none; color: var(--text); }
    .brand span { font-family: var(--display); font-size: 1.5rem; letter-spacing: 0.01em; }

    nav ul { display: none; list-style: none; margin: 0; padding: 0; gap: 1rem; }
    nav a { color: var(--text); text-decoration: none; font-size: 0.95rem; opacity: 0.9; }
    nav a:hover { color: var(--primary); }

    .toggle {
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      border-radius: 999px;
      padding: 0.5rem 0.85rem;
      cursor: pointer;
      font-weight: 600;
      font-size: .85rem;
      white-space: nowrap;
    }

    .hero { padding: var(--space-6) 0 var(--space-5); }
    h1 { font-family: var(--display); font-size: clamp(2.1rem, 5vw, 4rem); margin: 0 0 var(--space-2); }
    .sub { color: var(--muted); margin-bottom: var(--space-4); max-width: 760px; }
    .search {
      width: 100%;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      padding: 0.9rem 1rem;
      font-size: 1rem;
      outline: none;
      transition: border-color .2s;
    }
    .search:focus { border-color: var(--primary); }

    section { padding: var(--space-5) 0; }
    h2 { font-family: var(--display); font-size: clamp(1.7rem, 3vw, 2.4rem); margin: 0 0 var(--space-3); }

    .tabs { display: flex; flex-wrap: wrap; gap: 0.55rem; margin-bottom: var(--space-3); }
    .tab {
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text);
      padding: 0.48rem 0.8rem;
      border-radius: 999px;
      cursor: pointer;
      font-size: 0.9rem;
      transition: background .2s, color .2s;
    }
    .tab.active { background: var(--primary); color: #fff; border-color: transparent; }

    .grid { display: grid; grid-template-columns: 1fr; gap: var(--space-3); }
    .card {
      padding: var(--space-3);
      transition: transform .25s ease, box-shadow .25s ease, opacity .3s;
    }
    .card:hover { transform: translateY(-4px); box-shadow: var(--shadow); }
    .thumb { height: 120px; border-radius: 10px; margin-bottom: 0.8rem; }
    .meta { display: flex; justify-content: space-between; gap: .5rem; color: var(--muted); font-size: .9rem; align-items: center; }
    .badge { border: 1px solid var(--border); border-radius: 999px; padding: 0.12rem 0.55rem; font-size: .8rem; }
    .btn {
      margin-top: 0.85rem;
      display: inline-block;
      text-decoration: none;
      background: var(--primary);
      color: #fff;
      padding: 0.5rem 0.85rem;
      border-radius: 8px;
      font-weight: 600;
      font-size: .9rem;
    }
    .btn:hover { opacity: .88; }

    .calendar-wrap { display: grid; gap: var(--space-3); }
    .calendar { padding: var(--space-3); }
    .cal-head { display:flex; justify-content:space-between; align-items:center; margin-bottom: 0.8rem; }
    .arrow { border: 1px solid var(--border); background: transparent; color: var(--text); border-radius: 8px; padding: 0.35rem 0.55rem; cursor: pointer; }
    .cal-grid { display:grid; grid-template-columns: repeat(7, 1fr); gap: 0.35rem; }
    .weekday { text-align: center; font-size: .85rem; color: var(--muted); padding: .35rem 0; }
    .day {
      text-align: center;
      padding: 0.6rem 0;
      border-radius: 8px;
      border: 1px solid transparent;
      background: transparent;
      color: var(--text);
      position: relative;
      cursor: pointer;
      font-size: .9rem;
    }
    .day.muted { color: var(--muted); opacity: .4; cursor: default; }
    .day.has-event::after {
      content: "";
      position: absolute;
      bottom: 4px;
      left: 50%;
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--primary);
      transform: translateX(-50%);
    }
    .day.selected { border-color: var(--primary); background: color-mix(in srgb, var(--primary) 16%, transparent); }
    .day:not(.muted):hover { background: color-mix(in srgb, var(--primary) 10%, transparent); }

    .events-list { padding: var(--space-3); }
    .events-list h3 { font-family: var(--display); font-size: 1.2rem; margin: 0 0 .8rem; }
    .event-item { padding: .75rem 0; border-bottom: 1px solid var(--border); }
    .event-item:last-child { border-bottom: 0; }
    .event-date { color: var(--muted); font-size: .85rem; margin-bottom: .2rem; }
    .event-location { color: var(--muted); font-size: .85rem; margin-top: .2rem; }

    .list { padding: var(--space-2) 0; }
    .row {
      display: grid;
      grid-template-columns: 1fr;
      gap: .4rem;
      padding: .85rem 1rem;
      margin-bottom: .55rem;
      transition: box-shadow .2s;
    }
    .row:hover { box-shadow: var(--shadow); }
    .row-date { color: var(--muted); font-size: .85rem; }
    .row-tag { font-size: .85rem; color: var(--primary); }
    .link { color: var(--text); text-decoration: none; font-weight: 600; font-size: .9rem; }
    .link:hover { color: var(--primary); }

    footer { border-top: 1px solid var(--border); padding: 1.5rem 0 2rem; margin-top: 1.5rem; color: var(--muted); }
    footer .container { display: flex; justify-content: space-between; flex-wrap: wrap; gap: .5rem; font-size: .9rem; }

    @media (min-width: 768px) {
      nav ul { display: flex; }
      .grid { grid-template-columns: repeat(2, 1fr); }
      .calendar-wrap { grid-template-columns: 2fr 1fr; }
      .row { grid-template-columns: 140px 1fr 140px auto; align-items: center; }
    }
    @media (min-width: 1024px) {
      .grid { grid-template-columns: repeat(3, 1fr); }
    }
  </style>
</head>
<body>
  <header>
    <div class="container nav-wrap">
      <a href="#hero" class="brand">
        <svg width="28" height="28" viewBox="0 0 28 28" fill="none" aria-hidden="true">
          <rect x="2" y="2" width="24" height="24" rx="7" stroke="var(--primary)" stroke-width="2"/>
          <path d="M8 17L12 10L16 17L20 10" stroke="var(--primary)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <span>Ви.Тех</span>
      </a>
      <nav>
        <ul>
          <li><a href="#presentations">Презентации</a></li>
          <li><a href="#events">Мероприятия</a></li>
          <li><a href="#articles">Статьи</a></li>
          <li><a href="#articles">Подкасты</a></li>
        </ul>
      </nav>
      <button class="toggle" @click="toggleTheme()" x-text="theme === 'dark' ? '☀️ Светлая' : '🌙 Тёмная'"></button>
    </div>
  </header>

  <main>
    <section id="hero" class="hero container">
      <h1>Артефакты технобренда</h1>
      <p class="sub">Презентации, доклады, статьи и подкасты команды Ви.Тех — всё в одном месте</p>
      <input class="search" type="search" placeholder="Поиск по всем материалам..." x-model.trim="search" />
    </section>

    <section id="presentations" class="container">
      <h2>Презентации</h2>
      <div class="tabs">
        <template x-for="tab in presentationTabs" :key="tab">
          <button class="tab" :class="{'active': presentationFilter === tab}" @click="presentationFilter = tab" x-text="tab"></button>
        </template>
      </div>
      <div class="grid">
        <template x-for="item in filteredPresentations" :key="item.title">
          <article class="surface card" x-show="matchesSearch(item)" x-transition>
            <div class="thumb" :style="`background:${item.color}`"></div>
            <h3 x-text="item.title" style="font-size:1.1rem;margin:0 0 .5rem;"></h3>
            <div class="meta">
              <span class="badge" x-text="item.type"></span>
              <span x-text="item.year"></span>
            </div>
            <a href="#" class="btn">Скачать</a>
          </article>
        </template>
      </div>
    </section>

    <section id="events" class="container">
      <h2>Мероприятия</h2>
      <div class="calendar-wrap">
        <div class="surface calendar">
          <div class="cal-head">
            <button class="arrow" @click="changeMonth(-1)">←</button>
            <strong x-text="monthLabel"></strong>
            <button class="arrow" @click="changeMonth(1)">→</button>
          </div>
          <div class="cal-grid">
            <template x-for="w in weekdays"><div class="weekday" x-text="w"></div></template>
            <template x-for="day in calendarDays" :key="day.key">
              <button
                class="day"
                :disabled="!day.currentMonth"
                :class="{ 'muted': !day.currentMonth, 'has-event': day.hasEvent, 'selected': selectedDate === day.dateStr }"
                @click="selectDay(day)">
                <span x-text="day.day"></span>
              </button>
            </template>
          </div>
        </div>
        <aside class="surface events-list">
          <h3>Ближайшие события</h3>
          <template x-for="event in sidebarEvents" :key="event.title + event.date">
            <div class="event-item">
              <div class="event-date" x-text="formatDate(event.date)"></div>
              <div><strong x-text="event.title"></strong></div>
              <div class="event-location" x-text="event.location"></div>
            </div>
          </template>
        </aside>
      </div>
    </section>

    <section id="articles" class="container">
      <h2>Материалы</h2>
      <div class="tabs">
        <template x-for="type in artifactTypes" :key="type">
          <button class="tab" :class="{'active': artifactType === type}" @click="artifactType = type" x-text="type"></button>
        </template>
      </div>
      <div class="list">
        <template x-for="item in filteredArtifacts" :key="item.title">
          <article class="surface row" x-show="matchesSearch(item)" x-transition>
            <div class="row-date" x-text="formatDate(item.date)"></div>
            <div><strong x-text="item.title"></strong></div>
            <div class="row-tag" x-text="item.tag"></div>
            <a class="link" href="#">Читать →</a>
          </article>
        </template>
      </div>
    </section>
  </main>

  <footer>
    <div class="container">
      <div>Ви.Тех © 2026</div>
      <div>Технобренд для инженеров</div>
    </div>
  </footer>

  <script>
    function hubApp() {
      return {
        theme: 'dark',
        search: '',
        presentationFilter: 'Все',
        presentationTabs: ['Все', 'Митапы', 'Конференции', 'Внутренние'],
        artifactType: 'Статьи',
        artifactTypes: ['Статьи', 'Доклады', 'Подкасты'],
        weekdays: ['Пн', 'Вт', 'Ср', 'Чт', 'Пт', 'Сб', 'Вс'],
        currentDate: new Date(2026, 4, 1),
        selectedDate: null,
        presentations: [
          { title: 'Платформенная инженерия в Ви.Тех', type: 'Внутренние', year: 2026, color: '#345a61' },
          { title: 'Frontend performance playbook', type: 'Митапы', year: 2026, color: '#3e6a5c' },
          { title: 'Data Mesh для продуктовых команд', type: 'Конференции', year: 2025, color: '#6a4f7d' },
          { title: 'Набор и развитие DevRel-команды', type: 'Внутренние', year: 2025, color: '#77533e' },
          { title: 'Надёжность сервисов: SRE-практики', type: 'Митапы', year: 2026, color: '#2f4f74' },
          { title: 'Дизайн-системы в enterprise', type: 'Конференции', year: 2024, color: '#4f6f3a' }
        ],
        events: [
          { date: '2026-05-14', title: 'Внутренний Tech Demo Day', location: 'Москва, офис Ви.Тех' },
          { date: '2026-06-03', title: 'Митап: AI в разработке', location: 'Санкт-Петербург' },
          { date: '2026-07-18', title: 'Летний Frontend Summit', location: 'Казань' },
          { date: '2026-09-10', title: 'DevRel Workshop', location: 'Онлайн' },
          { date: '2026-11-21', title: 'Годовая техконференция Ви.Тех', location: 'Москва' }
        ],
        artifacts: {
          'Статьи': [
            { date: '2026-01-15', title: 'Как мы ускорили CI на 40%', tag: 'Инфраструктура' },
            { date: '2026-02-09', title: 'Гайд по архитектуре фронтенд-монорепо', tag: 'Frontend' },
            { date: '2026-03-01', title: 'Наблюдаемость микросервисов: практики', tag: 'Backend' },
            { date: '2026-03-20', title: 'Путь инженера в Ви.Тех', tag: 'Культура' },
            { date: '2026-04-12', title: 'Feature flags без боли', tag: 'Платформа' }
          ],
          'Доклады': [
            { date: '2026-01-28', title: 'Type-safe API контракты', tag: 'Доклад' },
            { date: '2026-02-18', title: 'Kubernetes в реальных продуктах', tag: 'Доклад' },
            { date: '2026-03-30', title: 'Edge rendering на практике', tag: 'Доклад' },
            { date: '2026-04-07', title: 'Zero-downtime релизы', tag: 'Доклад' },
            { date: '2026-04-29', title: 'Масштабирование команд разработки', tag: 'Доклад' }
          ],
          'Подкасты': [
            { date: '2026-01-10', title: 'Эпизод 1: Карьера staff инженера', tag: 'Подкаст' },
            { date: '2026-02-22', title: 'Эпизод 2: Переход на микрофронтенды', tag: 'Подкаст' },
            { date: '2026-03-14', title: 'Эпизод 3: Что такое инженерный бренд', tag: 'Подкаст' },
            { date: '2026-04-04', title: 'Эпизод 4: Инциденты и postmortem', tag: 'Подкаст' },
            { date: '2026-04-26', title: 'Эпизод 5: От прототипа к платформе', tag: 'Подкаст' }
          ]
        },
        init() {
          this.selectedDate = this.events[0].date;
          this.$nextTick(() => {
            this.revealOnScroll();
            this.animateHero();
          });
        },
        toggleTheme() {
          this.theme = this.theme === 'dark' ? 'light' : 'dark';
        },
        matchesSearch(item) {
          if (!this.search) return true;
          const q = this.search.toLowerCase();
          return Object.values(item).join(' ').toLowerCase().includes(q);
        },
        get filteredPresentations() {
          return this.presentations.filter(p => this.presentationFilter === 'Все' || p.type === this.presentationFilter);
        },
        get filteredArtifacts() {
          return (this.artifacts[this.artifactType] || []).filter(a => this.matchesSearch(a));
        },
        get monthLabel() {
          return this.currentDate.toLocaleDateString('ru-RU', { month: 'long', year: 'numeric' });
        },
        get eventDates() {
          return this.events.map(e => e.date);
        },
        get calendarDays() {
          const y = this.currentDate.getFullYear();
          const m = this.currentDate.getMonth();
          const firstDay = new Date(y, m, 1);
          const lastDay = new Date(y, m + 1, 0);
          const offset = (firstDay.getDay() + 6) % 7;
          const days = [];
          for (let i = 0; i < offset; i++) {
            days.push({ day: '', currentMonth: false, hasEvent: false, key: `p${i}` });
          }
          for (let d = 1; d <= lastDay.getDate(); d++) {
            const date = new Date(y, m, d);
            const dateStr = date.toISOString().slice(0, 10);
            days.push({ day: d, dateStr, currentMonth: true, hasEvent: this.eventDates.includes(dateStr), key: dateStr });
          }
          return days;
        },
        changeMonth(step) {
          this.currentDate = new Date(this.currentDate.getFullYear(), this.currentDate.getMonth() + step, 1);
        },
        selectDay(day) {
          if (!day.currentMonth || !day.hasEvent) return;
          this.selectedDate = day.dateStr;
        },
        get sidebarEvents() {
          const selected = this.events.filter(e => e.date === this.selectedDate);
          const upcoming = this.events.filter(e => e.date !== this.selectedDate);
          return [...selected, ...upcoming].slice(0, 5);
        },
        formatDate(date) {
          return new Date(date).toLocaleDateString('ru-RU', { day: 'numeric', month: 'long', year: 'numeric' });
        },
        revealOnScroll() {
          const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
              if (entry.isIntersecting) {
                if (window.gsap) {
                  gsap.fromTo(entry.target, { y: 20, opacity: 0 }, { y: 0, opacity: 1, duration: 0.55, ease: 'power2.out' });
                }
                observer.unobserve(entry.target);
              }
            });
          }, { threshold: 0.1 });
          document.querySelectorAll('.card, .row').forEach(el => observer.observe(el));
        },
        animateHero() {
          if (!window.gsap) return;
          gsap.from('#hero h1', { y: 24, opacity: 0, duration: 0.8 });
          gsap.from('#hero .sub', { y: 20, opacity: 0, duration: 0.8, delay: 0.1 });
          gsap.from('#hero .search', { y: 18, opacity: 0, duration: 0.8, delay: 0.2 });
        }
      }
    }
  </script>
</body>
</html>
